<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Madison 88 IT Asset Management</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./images/favicon.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="../src/styles/styles.css">
    
    <!-- Application Modules -->
    <script type="module" src="../src/scripts/utils.js"></script>
    <script src="../src/scripts/audit.js"></script>
</head>
<body>
    <!-- =============================================
         LOADING SCREEN
         ============================================= -->
    <div id="loading-screen">
        <div class="text-center">
            <div class="spinner mx-auto mb-4"></div>
            <p class="text-slate-400">Loading...</p>
        </div>
    </div>

    <!-- =============================================
         LOGIN PAGE
         ============================================= -->
    <div class="login-page" id="login-page">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <img src="../../public/images/logo.png" alt="Madison 88 Logo" onerror="this.style.display='none'">
                <p>IT Equipment Inventory Management System</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-4">
                <!-- Error Alert -->
                <div id="login-error" class="hidden bg-red-500/20 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg text-sm">
                    <span id="login-error-message"></span>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="you@madison88.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input pr-10" 
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                        <button 
                            type="button" 
                            id="toggle-password"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white"
                        >
                            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <svg id="eye-off-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="form-checkbox mr-2">
                    <label for="remember" class="text-sm text-slate-400">Remember me</label>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    id="login-btn"
                    class="btn btn-primary w-full py-3"
                >
                    <span id="login-btn-text">Sign In</span>
                    <svg id="login-spinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-8 pt-6 border-t border-slate-700 text-center">
                <p class="text-xs text-slate-500">
                    © 2026 Madison 88 Business Solutions Asia Inc.
                </p>
            </div>
        </div>
    </div>

    <!-- =============================================
         SCRIPTS
         ============================================= -->
    <script type="module">
        import { supabase, SUPABASE_URL } from '../src/scripts/config.js';
        
        // DOM Elements
        const loadingScreen = document.getElementById('loading-screen');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const loginErrorMessage = document.getElementById('login-error-message');
        const loginBtn = document.getElementById('login-btn');
        const loginBtnText = document.getElementById('login-btn-text');
        const loginSpinner = document.getElementById('login-spinner');
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        const eyeOffIcon = document.getElementById('eye-off-icon');

        /**
         * Initialize the page
         */
        async function init() {
            // Check if already logged in
            const { data: { session } } = await supabase.auth.getSession();
            
            if (session) {
                // Already logged in, redirect to dashboard
                window.location.href = '../src/pages/dashboard.html';
                return;
            }
            
            // Hide loading screen
            loadingScreen.classList.add('hidden');
        }

        /**
         * Toggle password visibility
         */
        togglePassword.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.classList.toggle('hidden', !isPassword);
            eyeOffIcon.classList.toggle('hidden', isPassword);
        });

        /**
         * Show error message
         */
        function showError(message) {
            loginError.classList.remove('hidden');
            loginErrorMessage.textContent = message;
        }

        /**
         * Hide error message
         */
        function hideError() {
            loginError.classList.add('hidden');
            loginErrorMessage.textContent = '';
        }

        /**
         * Set loading state
         */
        function setLoading(isLoading) {
            loginBtn.disabled = isLoading;
            loginBtnText.textContent = isLoading ? 'Signing in...' : 'Sign In';
            loginSpinner.classList.toggle('hidden', !isLoading);
        }

        /**
         * Handle form submission
         */
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            setLoading(true);

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                // Attempt login
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                // Log successful login to audit trail
                try {
                    await Audit.logLogin(email);
                } catch (auditError) {
                    console.error('Audit log error:', auditError);
                    // Don't block login if audit logging fails
                }

                // Successful login - redirect to dashboard
                window.location.href = '../src/pages/dashboard.html';

            } catch (error) {
                console.error('Login error:', error);
                
                // User-friendly error messages
                if (error.message.includes('Invalid login credentials')) {
                    showError('Invalid email or password. Please try again.');
                } else if (error.message.includes('Email not confirmed')) {
                    showError('Please verify your email address before logging in.');
                } else {
                    showError(error.message || 'An error occurred. Please try again.');
                }
                
                setLoading(false);
            }
        });

        // Initialize
        init();
    </script>
</body>
</html>
